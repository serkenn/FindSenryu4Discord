services:
  init:
    image: busybox:latest
    volumes:
      - "./data:/app/data"
    command: ["sh", "-c", "mkdir -p /app/data/backups && chown -R 65532:65532 /app/data"]
  app:
    build: .
    restart: always
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "9090:9090"
    volumes:
      - "./data:/app/data"
      - "./config.toml:/app/config.toml:ro"
    environment:
      # Override config via environment variables
      # FINDSENRYU_LOG_LEVEL: debug
      # FINDSENRYU_LOG_FORMAT: json
      # FINDSENRYU_DATABASE_DRIVER: postgres
      # FINDSENRYU_DATABASE_DSN: "host=db user=findsenryu dbname=findsenryu sslmode=disable"
      TZ: Asia/Tokyo
    # healthcheck disabled — distroless has no shell/curl
    # Use Docker restart policy for recovery
    stop_grace_period: 30s
